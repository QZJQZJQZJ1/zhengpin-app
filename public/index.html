      <script>
         document.addEventListener('DOMContentLoaded', () => {
            // 设置一点点延迟，防止 Vue 框架初始化时把我们的修改覆盖掉
            setTimeout(async () => {
               // 1. 获取 URL 中的防伪码参数
               const urlParams = new URLSearchParams(window.location.hash.split('?')[1] || window.location.search);
               const fwCode = urlParams.get('FWCode');

               if (!fwCode) return;

               // 【格式化防伪码】：每4个字符加一个空格
               const formattedCode = fwCode.match(/.{1,4}/g).join(' ');

               // 动态替换页面上硬编码的旧防伪码文字
               const allSpans = document.querySelectorAll('span');
               allSpans.forEach(span => {
                  if (span.innerText.includes('產品身份編碼：') || span.innerText.includes('1U16 K4YQ 610B E8KN')) {
                     span.innerText = `產品身份編碼：${formattedCode}`;
                  }
               });

               // 2. 找到要替换内容的 DOM 节点
               const contentBox = document.querySelector('.textspm');
               const iconImg = document.querySelector('.mainover.content__icon img');

               if (!contentBox) return;

               contentBox.innerHTML = "<div style='text-align:center; padding: 40px; color:#999;'>正在向云端数据库核对防伪信息，请稍候...</div>";

               try {
                  // 3. 请求 Vercel 后端接口
                  const response = await fetch(`/api/verify?FWCode=${fwCode}`);
                  const data = await response.json();

                  // 4. 解析数据并渲染到页面
                  if (data.response && data.response.FwCheckReplayInfoList) {
                     const info = data.response.FwCheckReplayInfoList[0];
                     const status = data.response.FWResultStatus;

                     contentBox.innerHTML = info.Content || info.WarnContent;

                     if (iconImg) {
                        if (status === 3) {
                           iconImg.src = 'https://img4.winmobi.cn/5.0/images/200163/1/2025-3/2025032016154634776.png';
                        } else {
                           iconImg.src = 'https://img4.winmobi.cn/5.0/images/200163/1/2025-3/2025032016153918709.png';
                        }
                     }
                  } else {
                     contentBox.innerHTML = `<div style='text-align:center; padding: 20px;'><h2 style='color:#f5222d; font-size: 22px; font-weight: bold;'>查询失败</h2><p style='margin-top: 10px; color: #666; font-size: 14px;'>${data.msg}</p></div>`;
                     if (iconImg) iconImg.src = 'https://img4.winmobi.cn/5.0/images/200163/1/2025-3/2025032016154634776.png';
                  }
               } catch (error) {
                  contentBox.innerHTML = "<div style='text-align:center; padding: 20px; color:#f5222d;'>网络或服务器错误，请稍后再试</div>";
               }
            }, 300);
         });
      </script>
